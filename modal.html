<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Images</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #333;
      padding: 20px;
      background: #fff;
    }
    h2 { font-size: 16px; margin-bottom: 12px; }
    #count { font-weight: 600; margin-bottom: 4px; }
    #skipped { color: #888; font-size: 12px; margin-bottom: 16px; min-height: 16px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .buttons { display: flex; gap: 8px; margin-bottom: 16px; }
    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    #btn-zip { background: #4262ff; color: #fff; }
    #btn-zip:hover:not(:disabled) { background: #3451d1; }
    #btn-separate { background: #f0f0f0; color: #333; }
    #btn-separate:hover:not(:disabled) { background: #e0e0e0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #file-list {
      margin-bottom: 14px;
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 6px 8px;
      background: #fafafa;
    }
    #file-list .file-item {
      font-size: 12px;
      color: #444;
      padding: 2px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #file-list .more-btn {
      font-size: 12px;
      color: #4262ff;
      cursor: pointer;
      padding: 2px 0;
      border: none;
      background: none;
      text-align: left;
    }
    #file-list .more-btn:hover { text-decoration: underline; }
    #status { font-size: 12px; color: #555; min-height: 18px; }
    #progress { font-size: 12px; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <h2>Images Downloader</h2>
  <div id="count">Loading…</div>
  <div id="skipped"></div>
  <div id="file-list" style="display:none"></div>

  <div class="field">
    <label for="format">Export format</label>
    <select id="format">
      <option value="original">Original</option>
      <option value="png">PNG</option>
      <option value="jpg">JPG</option>
      <option value="webp">WebP</option>
    </select>
  </div>

  <div class="buttons">
    <button id="btn-zip">Download as ZIP</button>
    <button id="btn-separate">Download separately</button>
  </div>

  <div id="status"></div>
  <div id="progress"></div>

  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <script src="/modal.js" type="module"></script>
</body>
</html>
